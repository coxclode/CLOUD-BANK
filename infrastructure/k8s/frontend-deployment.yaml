---
# ─── frontend — Next.js, stateless, sin secretos de base de datos ─────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: cloudbank
  labels: { app: frontend, tier: frontend }
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: frontend
          image: cloudbank/frontend:1.0
          imagePullPolicy: Always
          ports:
            - { containerPort: 3000, name: http }
          env:
            - { name: BACKEND_URL, value: "http://backend-svc.cloudbank.svc.cluster.local" }
            - { name: NODE_ENV, value: "production" }
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits: { cpu: "1", memory: "512Mi" }
          readinessProbe:
            httpGet: { path: /login, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /login, port: 3000 }
            initialDelaySeconds: 15
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: cloudbank
spec:
  selector: { app: frontend }
  ports:
    - { name: http, port: 80, targetPort: 3000 }
  type: ClusterIP   # Expuesto vía Ingress/LoadBalancer, no directamente

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: cloudbank
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: frontend }
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
