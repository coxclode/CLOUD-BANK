# CLOUD BANK — Logging Configuration
# Procesado por src/monitoring/logging/structured_logger.py
# No modificar sin actualizar también el código que lo lee.

version: 1
disable_existing_loggers: false

formatters:
  json:
    "()": structlog.stdlib.ProcessorFormatter
    processor: structlog.processors.JSONRenderer
    foreign_pre_chain:
      - structlog.contextvars.merge_contextvars
      - structlog.processors.add_log_level
      - structlog.processors.TimeStamper
  console:
    "()": structlog.stdlib.ProcessorFormatter
    processor: structlog.dev.ConsoleRenderer
    foreign_pre_chain:
      - structlog.contextvars.merge_contextvars
      - structlog.processors.add_log_level
      - structlog.processors.TimeStamper

handlers:
  console:
    class: logging.StreamHandler
    stream: ext://sys.stdout
    formatter: console
    level: DEBUG
  file:
    class: logging.handlers.RotatingFileHandler
    filename: logs/cloudbank.log
    maxBytes: 10485760   # 10 MB
    backupCount: 5
    formatter: json
    level: INFO

root:
  level: INFO
  handlers: [console]

loggers:
  cloudbank:
    level: DEBUG
    handlers: [console, file]
    propagate: false
  uvicorn:
    level: INFO
    handlers: [console]
    propagate: false
  uvicorn.error:
    level: INFO
    handlers: [console]
    propagate: false
  uvicorn.access:
    level: WARNING
    handlers: [console]
    propagate: false
  asyncpg:
    level: WARNING
    propagate: true
  redis:
    level: WARNING
    propagate: true

# PII fields que deben ser redactados en cualquier entorno
pii_fields:
  - national_id
  - phone
  - email
  - full_name
  - address
  - date_of_birth
  - ip_address
  - device_id
  - account_number
  - card_number
